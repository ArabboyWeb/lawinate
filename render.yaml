services:
  - type: web
    name: lawinate-backend
    env: node
    rootDir: fullstack_app/server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SQLITE_DB_FILE
        value: /var/data/database.db
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://lawinate.uz
      - key: CLIENT_URL
        value: https://lawinate.uz
      - key: CORS_ORIGIN
        value: https://lawinate.uz,https://www.lawinate.uz,https://lawinate.netlify.app
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://lawinate-sc7t.onrender.com/api/auth/google/callback
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: MODERATOR_SEED_EMAIL
        sync: false
      - key: MODERATOR_SEED_PASSWORD
        sync: false
      - key: STUDENT_SEED_PASSWORD
        sync: false
